# 前端 Nginx：对外唯一入口。
# - /          单页应用（含 history 路由回退；应用内的 /admin 等页面由前端路由处理）
# - /api/      反代到后端 gunicorn
# - /django-admin/  反代到 Django 管理后台（避开与前端 /admin 路由冲突）
# - /static/   后端静态资源（admin / DRF 可浏览接口），来自共享卷
# - /media/    仅存放测试数据(.in/.out)即“答案”，一律 404，杜绝泄题
server {
    listen 80;
    server_name _;

    # 允许较大的测试数据 ZIP 上传（后端上限约 100MB）
    client_max_body_size 128m;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /django-admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    # 测试数据是评测答案，绝不可外泄
    location /media/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
